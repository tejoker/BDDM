name: Lean Action CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  lean-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: leanprover/lean-action@v1

  python-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: leanprover/lean-action@v1
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Compile Python scripts
        run: |
          python -m py_compile scripts/*.py
      - name: Run smoke test (no API required)
        run: |
          python scripts/smoke_test.py

  python-integration:
    runs-on: ubuntu-latest
    needs: [lean-build, python-check]
    if: ${{ secrets.MISTRAL_API_KEY != '' }}
    env:
      MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
      MISTRAL_MODEL: labs-leanstral-2603

    steps:
      - uses: actions/checkout@v4
      - uses: leanprover/lean-action@v1
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Run hello-world integration
        run: |
          python scripts/hello_world_integration.py --project-root . --telemetry-file logs/ci_hello_world_telemetry.json
