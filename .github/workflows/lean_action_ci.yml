name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  lean-build:
    name: Lean build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: leanprover/lean-action@v1

  python-check:
    name: Python lint + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Compile all scripts
        run: python -m py_compile scripts/*.py
      - name: Release readiness baseline checks
        run: python scripts/release_readiness.py
      - name: Run unit tests (no API, no Lean required)
        run: python -m pytest tests/ -v --tb=short

  smoke-test:
    name: Smoke test (no API)
    runs-on: ubuntu-latest
    needs: [python-check]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Smoke test
        run: python scripts/smoke_test.py
      - name: Public claims reproduction smoke
        run: |
          python3 scripts/reproduce_public_claims.py \
            --suite reproducibility/paper_agnostic_golden10.json \
            --smoke \
            --max-papers 1 \
            --out-root output/reproducibility/public_claims_smoke

  integration:
    name: Integration test (requires MISTRAL_API_KEY)
    runs-on: ubuntu-latest
    needs: [lean-build, python-check]
    if: ${{ secrets.MISTRAL_API_KEY != '' }}
    env:
      MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
      MISTRAL_MODEL: labs-leanstral-2603
    steps:
      - uses: actions/checkout@v4
      - uses: leanprover/lean-action@v1
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Run 5-problem miniF2F smoke benchmark
        run: |
          python scripts/benchmark_minif2f.py \
            --split valid \
            --n-problems 5 \
            --k 1 \
            --workers 1 \
            --project-root . \
            --lean-timeout 120 \
            --out-dir output/ci_smoke
