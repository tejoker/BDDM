name: gold-quality-gates

on:
  pull_request:
  workflow_dispatch:

jobs:
  fidelity-and-linkage-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Translation fidelity gate
        run: |
          python3 scripts/eval_translation_fidelity.py \
            --gold reproducibility/gold_translation_fidelity.jsonl \
            --kg-db output/kg/kg_index.db \
            --min-score 0.80 \
            --out output/reports/gates/translation_fidelity.json
      - name: Linkage precision/recall gate
        run: |
          python3 scripts/gold_linkage_eval.py \
            --gold reproducibility/gold_linkage_set.jsonl \
            --kg-db output/kg/kg_index.db \
            --out output/reports/gates/linkage_eval.json
      - name: Upload gate artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gold-quality-gates
          path: output/reports/gates
