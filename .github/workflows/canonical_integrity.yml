name: Canonical integrity

# Read-only audits that the canonical FP / AB / IP claims are still backed
# by their on-disk evidence. Triggered on every push and PR — the goal is
# to catch ledger drift (sorry-bodied "FULLY_PROVEN" rows, stale gate_failures
# lists, missing paper-theory oleans, theorems that left output/<id>.lean
# without losing their promotion claim) BEFORE it lands on main.
#
# None of these jobs invoke arXiv, Mistral, or any state-modifying script.
# They run against committed evidence only and fail fast on the first
# integrity gap.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  reproduce-canonical-evidence:
    name: Reproduce canonical FP/AB/IP table
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install python deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Reproduce canonical evidence (structural, no lake)
        # Exit non-zero iff any FP/AB/IP claim is not structurally backed
        # by output/<id>.lean. The default fast path skips `lake env lean`;
        # it relies on the same sorry-detector / trivialization-detector
        # used by audit_fully_proven_integrity.
        run: |
          python scripts/reproduce_canonical_evidence.py \
            --json-out output/audits/reproduce_canonical_evidence.json
      - name: Upload reproduction summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reproduce-canonical-evidence
          path: output/audits/reproduce_canonical_evidence.json
          if-no-files-found: ignore

  audit-fully-proven-integrity:
    name: Audit FULLY_PROVEN / AB / IP integrity (read-only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install python deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Audit (dry-run; non-zero if any row would be demoted)
        # `--include-ip-ab` widens the audit to AXIOM_BACKED and
        # INTERMEDIARY_PROVEN rows (the same circular bypass that
        # inflated FP also reaches AB/IP). `--fail-on-demote` flips the
        # exit code; no ledger is mutated.
        run: |
          python scripts/audit_fully_proven_integrity.py \
            --include-ip-ab \
            --fail-on-demote \
            > output/audits/audit_fully_proven_integrity.json
      - name: Upload audit summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-fully-proven-integrity
          path: output/audits/audit_fully_proven_integrity.json
          if-no-files-found: ignore

  audit-gate-consistency:
    name: Audit gate-failure list consistency (read-only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install python deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Audit (dry-run; non-zero if any row needs rebuild)
        run: |
          python scripts/audit_gate_consistency.py \
            --fail-on-rebuild \
            > output/audits/audit_gate_consistency.json
      - name: Upload audit summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-gate-consistency
          path: output/audits/audit_gate_consistency.json
          if-no-files-found: ignore

  audit-paper-theory-olean-health:
    name: Audit paper-theory olean health
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: leanprover/lean-action@v1
        # We need lake on PATH because this audit actually invokes
        # `lake build` on each PaperTheory module.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install python deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Audit (non-zero on any failing module)
        run: |
          python scripts/audit_paper_theory_olean_health.py
      - name: Upload audit summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-paper-theory-olean-health
          path: output/audits/paper_theory_olean_health.json
          if-no-files-found: ignore

  audit-lake-validate-bodies:
    name: Audit lake-validate-bodies (heavy, with Mathlib)
    runs-on: ubuntu-latest
    # Triggered manually or on a schedule — not on every PR because
    # downloading Mathlib + running lake on every canonical paper takes
    # ~10-20 min. The lightweight body-is-sorry + trivialization checks
    # in `audit-fully-proven-integrity` above cover most regressions on
    # every push; this one catches the file_body_does_not_elaborate
    # class that requires lake.
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: leanprover/lean-action@v1
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install python deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Audit with lake-validate-bodies (non-zero on any demotion)
        run: |
          python scripts/audit_fully_proven_integrity.py \
            --include-ip-ab \
            --lake-validate-bodies \
            --fail-on-demote \
            > output/audits/audit_lake_validate_bodies.json
      - name: Upload audit summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-lake-validate-bodies
          path: output/audits/audit_lake_validate_bodies.json
          if-no-files-found: ignore
